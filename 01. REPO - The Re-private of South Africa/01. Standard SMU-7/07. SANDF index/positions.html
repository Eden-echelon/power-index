<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>positions</title>

<link rel="icon" href="presets/images/SANDF_emblem.svg.png" />

<style>

/* ================= GLOBAL RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: "Courier New", monospace;
  color: #d4ffe2;
  overflow-x: hidden;
  background: #0a0f0d;
}

/* ================= SPECIAL OPS BACKGROUND ================= */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,100,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,180,255,0.08), transparent 40%),
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  z-index: -3;
}

/* Tactical grid overlay */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(0,255,120,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,120,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -2;
}

/* Scanline effect */
.scanlines {
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,120,0.02),
    rgba(0,255,120,0.02) 2px,
    transparent 2px,
    transparent 4px
  );
  z-index: -1;
  pointer-events: none;
}

/* ================= CONTAINER ================= */
.container {
  max-width: 1400px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

/* ================= HEADER ================= */
h1 {
  color: #00ff88;
  font-size: clamp(28px, 5vw, 60px);
  letter-spacing: 4px;
  text-shadow: 0 0 15px #00ff88;
  margin-bottom: 50px;
  animation: pulseTitle 2s infinite alternate;
}

@keyframes pulseTitle {
  from { text-shadow: 0 0 10px #00ff88; }
  to   { text-shadow: 0 0 25px #00ffaa; }
}

/* ================= POSITION GRID ================= */
.positions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
}

/* ================= POSITION CARD ================= */
.position-block {
  background: rgba(10,20,15,0.85);
  border: 2px solid #00ff88;
  border-radius: 12px;
  padding: 30px 20px;
  cursor: pointer;
  transition: 0.3s ease;
  position: relative;
  overflow: hidden;
}

.position-block::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(0,255,150,0.08), transparent);
  transform: translateX(-100%);
  transition: 0.5s;
}

.position-block:hover::before {
  transform: translateX(100%);
}

.position-block:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00ff88;
}

.position-block h2 {
  color: #00e1ff;
  font-size: 20px;
  margin-bottom: 10px;
}

/* ================= MODAL ================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 999;
}

.modal-content {
  background: #07120d;
  border: 2px solid #00ff88;
  border-radius: 10px;
  padding: 30px;
  max-width: 700px;
  width: 100%;
  text-align: left;
  animation: modalIn 0.4s ease;
}

@keyframes modalIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal h3 {
  color: #00ff88;
  margin-bottom: 15px;
}

.modal p {
  margin-bottom: 10px;
  line-height: 1.6;
}

.close-btn {
  margin-top: 15px;
  background: #00ff88;
  border: none;
  padding: 10px 15px;
  font-weight: bold;
  cursor: pointer;
}

/* ================= BACK LINK ================= */
.back-home {
  display: inline-block;
  margin-top: 50px;
  color: #00e1ff;
  text-decoration: none;
  font-weight: bold;
}

.back-home:hover { color: red; }

/* ================= RESPONSIVE TUNING ================= */
@media (max-width: 600px) {
  .position-block { padding: 20px; }
  .modal-content { padding: 20px; }
}

</style>

</head>

<body>
<div class="scanlines"></div>

<div class="container">
  <h1>Positions</h1>

  <div class="positions-grid">
    <div class="position-block" onclick="openModal('a')">
      <h2>POSITION A — VIETNAM (SAVANNAH PARK)</h2>
    </div>

    <div class="position-block" onclick="openModal('b')">
      <h2>POSITION B — CONGO (MKHULU'S PLACE)</h2>
    </div>

    <div class="position-block" onclick="openModal('c')">
      <h2>POSITION C — BANGKOK (ETHEKWINI MUNICIPALITY)</h2>
    </div>

    <div class="position-block" onclick="openModal('echo')">
      <h2>POSITION ECHO — MUNICIPAL LIBRARIES</h2>
    </div>
  </div>

  <a href="index.html" class="back-home">⟵ RETURN TO HQ</a>
</div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

const intelData = {
  a: {
    title: "POSITION A – SAVANNAH PARK",
    purpose: "Forward observation & civilian movement monitoring.",
    location: "Urban-residential perimeter zone.",
    intel: "High foot traffic. Strategic visibility over access routes."
  },
  b: {
    title: "POSITION B – MKHULU'S PLACE",
    purpose: "Logistics & fallback coordination point.",
    location: "Private controlled structure.",
    intel: "Low external visibility. Strong cover potential."
  },
  c: {
    title: "POSITION C – ETHEKWINI MUNICIPALITY",
    purpose: "Administrative surveillance & data awareness.",
    location: "Central urban sector.",
    intel: "Government movement patterns observed."
  },
  echo: {
    title: "POSITION ECHO – LIBRARIES",
    purpose: "Information flow monitoring.",
    location: "Public knowledge centers.",
    intel: "Civilian research behaviors tracked."
  }
};

function openModal(id) {
  const data = intelData[id];
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <h3>${data.title}</h3>
    <p><strong>PURPOSE:</strong> ${data.purpose}</p>
    <p><strong>LOCATION TYPE:</strong> ${data.location}</p>
    <p><strong>INTEL NOTES:</strong> ${data.intel}</p>
    <button class="close-btn" onclick="closeModal()">CLOSE INTEL</button>
  `;
  modal.style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(e) {
  if (e.target.id === "modal") closeModal();
};

</script>

</body>

</html>
