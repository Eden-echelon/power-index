<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSDS</title>

<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Consolas", monospace;
    }

    body {
        background: radial-gradient(circle at center, #0a0f0a, #000);
        color: #00ff88;
        overflow-x: hidden;
    }

    header {
        padding: 20px;
        border-bottom: 1px solid #00ff88;
        text-align: center;
        letter-spacing: 2px;
    }

    header h1 {
        font-size: 22px;
    }

    header p {
        font-size: 12px;
        opacity: 0.6;
    }

    .container {
        display: grid;
        grid-template-columns: 250px 1fr;
        min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
        border-right: 1px solid #00ff88;
        padding: 20px;
        background: rgba(0,0,0,0.7);
    }

    .sidebar h2 {
        font-size: 14px;
        margin-bottom: 15px;
    }

    ul {
        list-style: none;
    }

    li {
        margin-bottom: 10px;
    }

    a {
        text-decoration: none;
        color: #00ff88;
        font-size: 13px;
        display: block;
        padding: 6px;
        transition: 0.2s;
        border-left: 2px solid transparent;
    }

    a:hover {
        background: rgba(0,255,136,0.1);
        border-left: 2px solid #00ff88;
    }

    /* MAIN DISPLAY */
    .main {
        padding: 20px;
    }

    .panel {
        border: 1px solid #00ff88;
        padding: 15px;
        margin-bottom: 20px;
        background: rgba(0,0,0,0.6);
    }

    .panel h3 {
        margin-bottom: 10px;
        font-size: 14px;
        border-bottom: 1px solid #00ff88;
        padding-bottom: 5px;
    }

    .data-line {
        font-size: 12px;
        margin: 4px 0;
        opacity: 0.8;
    }

    /* STATUS BAR */
    .status-bar {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #000;
        border-top: 1px solid #00ff88;
        padding: 5px 10px;
        font-size: 11px;
        display: flex;
        justify-content: space-between;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    /* HOVER MESSAGE */
    #msgBox {
        position: fixed;
        bottom: 40px;
        left: 10px;
        font-size: 12px;
        opacity: 0.7;
    }

</style>

</head>

<body>

<header>
    <h1>MSDS</h1>
</header>

<div class="container">

    <div class="sidebar">
        <h2>ACCESS TIERS</h2>

        <ul>
            <li><a href="T1.html" class="link-ghost" data-msg="TIER 4 SOLDIER PROFILE | Infantry core: disciplined, lethal. Never take off the backpack & strap bag">Tier 4 - Soldier - One for the pack.</a></li>
            <li><a href="t2.html" class="link-ghost" data-msg="TIER 3 OPERATIVE | counter-intelligence.">Tier 3 - Operative - Espionage</a></li>
            <li><a href="t3.html" class="link-ghost" data-msg="TIER 2 [PROTOCOL 301] | Restricted: ZA-bravo clearance.">Tier 2 - [protocol 301.]</a></li>
            <li><a href="t4.html" class="link-ghost" data-msg="TIER 1 OPERATOR ACCESS | SMU-7 command node authorized.">Tier 1 - Operator - HQ</a></li>
        </ul>

        <br>

    </div>

    </div>

</div>

<script>
    // CLOCK
    function updateTime() {
        const now = new Date();
        document.getElementById("time").textContent =
            now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);

    // HOVER MESSAGE SYSTEM
    const links = document.querySelectorAll(".link-ghost");
    const msgBox = document.getElementById("msgBox");

    links.forEach(link => {
        link.addEventListener("mouseover", () => {
            msgBox.textContent = link.dataset.msg;
        });

        link.addEventListener("mouseout", () => {
            msgBox.textContent = "Hover over a tier...";
        });
    });

</script>

</body>

</html>
