<!DOCTYPE html>

<html lang="en">
    
<head>
    
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <title>South African Police Service</title>
    
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --saps-blue: #1a3e6f;
            --saps-gold: #c9a03d;
            --saps-red: #b22234;
            --saps-light: #f0f4fa;
            --saps-dark: #0a1428;
        }

        body {
            background: var(--saps-dark);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            color: var(--saps-light);
            padding: 1.5rem;
        }

        .saps-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .saps-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--saps-gold);
        }

        .saps-logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--saps-gold);
        }

        .saps-tagline {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            color: var(--saps-light);
            opacity: 0.8;
        }

        .saps-main {
            min-height: 60vh;
            background: rgba(26, 62, 111, 0.2);
            border-radius: 8px;
            padding: 2rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(201, 160, 61, 0.3);
            text-align: center;
        }

        .saps-placeholder {
            color: var(--saps-gold);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .saps-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(201, 160, 61, 0.4);
            text-align: center;
            font-size: 0.75rem;
            color: var(--saps-light);
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .saps-logo { font-size: 1.8rem; }
            .saps-main { padding: 1rem; }
        }
        
    </style>
    
</head>
    
<body>
    
    <div class="saps-container">
        <!-- Header -->
        <div class="saps-header">
            <div class="saps-logo">SOUTH AFRICAN POLICE SERVICE</div>
            <div class="saps-tagline">SERVICE • PROTECTION • JUSTICE</div>
        </div>

        <div class="saps-main">
            <div class="saps-placeholder">🇿🇦 SAPS INTERNAL DEFENCE</div>
            <p style="margin-top: 1rem; font-size: 0.9rem;">Ready for your implementation.<br>The internal defence of South Africa.</p>
        </div>

        <div class="saps-footer">
            <span>SOUTH AFRICAN POLICE SERVICE • NATIONAL HEADQUARTERS • PRETORIA</span>
        </div>
    </div>
    
</body>
    
</html>
